kind = "web"
previewPath = "/"
title = "Cadastro de Funcionários"
version = "1.0.0"
id = "artifacts/employee-form"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26251

[services.development]
run = "pnpm --filter @workspace/employee-form run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/employee-form", "run", "build" ]
publicDir = "artifacts/employee-form/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26251"
BASE_PATH = "/"
